services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: folio
      POSTGRES_PASSWORD: folio
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U folio"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      private:
        aliases:
          - postgres

  catalog-service:
    build:
      context: ./server/catalog-service
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://folio:folio@postgres:5432/folio_catalog?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      private:
        aliases:
          - catalog-service

  inventory-service:
    build:
      context: .
      dockerfile: server/inventory-service/Dockerfile
    environment:
      - DATABASE_URL=postgres://folio:folio@postgres:5432/folio_inventory?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      private:
        aliases:
          - inventory-service

  gateway-service:
    build:
      context: .
      dockerfile: server/gateway-service/Dockerfile
    ports:
      - "8090:8090"
    environment:
      - CATALOG_URL=http://catalog-service:8080
      - INVENTORY_ADDR=inventory-service:9090
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=folio
    depends_on:
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      public:
        aliases:
          - gateway-service
      private:
        aliases:
          - gateway-service

  store:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./client/store:/app
      - store-node-modules:/app/node_modules
    environment:
      - GATEWAY_URL=http://gateway-service:8090
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      gateway-service:
        condition: service_started
    networks:
      public:
        aliases:
          - store

  admin:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ./client/admin:/app
      - admin-node-modules:/app/node_modules
    environment:
      - GATEWAY_URL=http://gateway-service:8090
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      gateway-service:
        condition: service_started
    networks:
      public:
        aliases:
          - admin

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_URL=http://localhost:8180
      - KC_HOSTNAME_ADMIN_URL=http://localhost:8180
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./scripts/keycloak/folio-realm.json:/opt/keycloak/data/import/folio-realm.json
    healthcheck:
      test:
        ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      private:
        aliases:
          - keycloak

networks:
  public:
    driver: bridge
  private:
    driver: bridge

volumes:
  postgres-data:
  keycloak-data:
  store-node-modules:
  admin-node-modules:
