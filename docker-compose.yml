services:
  catalog-service:
    build:
      context: ./server/catalog-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/catalog.db
    volumes:
      - catalog-data:/data

  inventory-service:
    build:
      context: ./server/inventory-service
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      - DB_PATH=/data/inventory.db
    volumes:
      - inventory-data:/data

  gateway-service:
    build:
      context: .
      dockerfile: server/gateway-service/Dockerfile
    ports:
      - "8090:8090"
    environment:
      - CATALOG_URL=http://catalog-service:8080
      - INVENTORY_ADDR=inventory-service:9090
    depends_on:
      - catalog-service
      - inventory-service

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    ports:
      - "8180:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - keycloak-data:/opt/keycloak/data

volumes:
  catalog-data:
  inventory-data:
  keycloak-data:
